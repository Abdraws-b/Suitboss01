<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Line-art illustration of a tailored blazer on a hanger with a draped measuring tape">
  <defs>
    <radialGradient id="canopyVignette" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16273f" />
      <stop offset="100%" stop-color="#0F1A2C" />
    </radialGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8BF98" />
      <stop offset="100%" stop-color="#A88856" />
    </linearGradient>
  </defs>

  <!-- Base canvas -->
  <rect width="800" height="1000" fill="url(#canopyVignette)" />

  <!-- Fine decorative frame, inset from the edges -->
  <rect x="36" y="36" width="728" height="928" fill="none" stroke="#C5A880" stroke-width="0.75" opacity="0.25" />

  <!-- Scattered constellation-style stitch dots for quiet texture -->
  <g fill="#C5A880" opacity="0.35">
    <circle cx="110" cy="140" r="2" />
    <circle cx="150" cy="210" r="1.4" />
    <circle cx="95" cy="300" r="1.8" />
    <circle cx="660" cy="160" r="2" />
    <circle cx="700" cy="230" r="1.4" />
    <circle cx="650" cy="310" r="1.6" />
    <circle cx="120" cy="820" r="1.6" />
    <circle cx="80" cy="740" r="2" />
    <circle cx="690" cy="800" r="1.8" />
    <circle cx="640" cy="880" r="1.4" />
    <circle cx="400" cy="90" r="1.6" />
  </g>

  <!-- Hanger -->
  <g stroke="url(#goldStroke)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M400 138 C 400 118, 416 118, 416 138" />
    <circle cx="400" cy="138" r="3" fill="#C5A880" stroke="none" />
    <path d="M290 214 L400 148 L510 214" />
    <path d="M330 214 L470 214" />
  </g>

  <!-- Blazer silhouette -->
  <g stroke="url(#goldStroke)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left half: shoulder, sleeve, lapel, body to hem -->
    <path d="M290 214
             C 250 226, 224 258, 218 300
             C 214 340, 224 420, 232 470
             L 246 700
             C 250 730, 258 758, 272 782
             L 300 812" />
    <!-- Left lapel -->
    <path d="M330 214 L 372 262 L 336 452" />
    <!-- Left collar notch -->
    <path d="M290 214 L 330 214" />

    <!-- Right half (mirrored) -->
    <path d="M510 214
             C 550 226, 576 258, 582 300
             C 586 340, 576 420, 568 470
             L 554 700
             C 550 730, 542 758, 528 782
             L 500 812" />
    <!-- Right lapel -->
    <path d="M470 214 L 428 262 L 464 452" />
    <path d="M510 214 L 470 214" />

    <!-- Hem curve -->
    <path d="M300 812 C 340 828, 460 828, 500 812" />

    <!-- Center front seam, subtly open -->
    <path d="M372 262 C 366 380, 366 520, 372 640" opacity="0.6" />
    <path d="M428 262 C 434 380, 434 520, 428 640" opacity="0.6" />
  </g>

  <!-- Buttons -->
  <g fill="#C5A880">
    <circle cx="400" cy="560" r="3.2" />
    <circle cx="400" cy="610" r="3.2" />
  </g>

  <!-- Breast pocket square -->
  <path d="M330 320 L 356 312 L 362 336 L 336 344 Z" stroke="#C5A880" stroke-width="1.2" fill="none" opacity="0.7" />

  <!-- Draped measuring tape, sweeping across the lower third -->
  <g stroke="#C5A880" stroke-width="1.4" fill="none" opacity="0.85">
    <path d="M120 900 C 260 950, 420 840, 560 900 S 760 830, 700 760" stroke-dasharray="1 11" stroke-linecap="round" />
    <path d="M120 900 C 260 950, 420 840, 560 900 S 760 830, 700 760" stroke-dasharray="none" stroke-width="0.6" opacity="0.5" />
  </g>
  <circle cx="120" cy="900" r="5" fill="none" stroke="#C5A880" stroke-width="1.2" />
  <circle cx="700" cy="760" r="4" fill="#C5A880" />

  <!-- Needle and thread motif, upper right quadrant -->
  <g stroke="#C5A880" stroke-width="1.3" fill="none" opacity="0.8" stroke-linecap="round">
    <path d="M560 120 L 640 190" />
    <ellipse cx="636" cy="186" rx="6" ry="3" transform="rotate(45 636 186)" />
    <path d="M560 120 C 520 150, 500 190, 470 176 C 448 165, 452 138, 470 128" stroke-dasharray="3 5" />
  </g>

  <!-- Small brand monogram flourish, bottom right corner -->
  <text x="700" y="946" text-anchor="end" font-family="Georgia, 'Cormorant Garamond', serif" font-size="15" letter-spacing="4" fill="#C5A880" opacity="0.45">SUIT BOSS</text>
</svg>
