<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal | Suit Boss Fashion</title>
    <meta name="description" content="Log in to your private Suit Boss workspace to manage bespoke dimensions and review ongoing master tailor communication threads.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <main class="auth-portal-stage" id="main-content">

        <div id="atelier-toast-container" aria-live="assertive" class="toast-wrapper"></div>

        <!-- Mobile hamburger trigger — fixed position since this page has no
             standard .atelier-header bar to embed it in. Hidden on desktop,
             revealed ≤768px. Controller logic lives in app.js. -->
        <button
            type="button"
            class="atelier-hamburger auth-hamburger-fixed"
            id="atelier-hamburger-toggle"
            aria-label="Open navigation menu"
            aria-expanded="false"
            aria-controls="atelier-mobile-drawer"
        >
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <!-- Dimming layer behind the drawer; tap to close -->
        <div class="atelier-drawer-backdrop" id="atelier-drawer-backdrop"></div>

        <!-- Full-screen glass-morphic drawer. Only the pre-auth destinations
             make sense here — no dashboard/logout controls on the login page. -->
        <div class="atelier-mobile-drawer" id="atelier-mobile-drawer" aria-hidden="true">
            <nav aria-label="Mobile Navigation">
                <ul class="nav-links drawer-nav-links">
                    <li><a href="index.html">Lookbook</a></li>
                    <li><a href="custom-order.html">Bespoke Pre-Order</a></li>
                </ul>
            </nav>
        </div>

        <section class="auth-canopy-pane">
            <div class="auth-canopy-slideshow" id="auth-canopy-slideshow" aria-hidden="true">
                <div class="auth-canopy-slide is-active" data-slide-index="0">
                    <img src="/images/IMG_0378.JPG.jpeg" alt="" class="auth-bg-media">
                </div>
                <div class="auth-canopy-slide" data-slide-index="1">
                    <img src="/images/fashion-illustration.svg" alt="" class="auth-bg-media auth-bg-media--illustration">
                </div>
            </div>
            <div class="auth-canopy-content">
                <a href="index.html" class="auth-brand-logo">
                    <span class="auth-brand-logo-3d-wrap">
                        <img src="/images/suitboss-logo.svg" alt="Suit Boss" class="auth-brand-logo-img">
                    </span>
                </a>
                <h1 class="auth-editorial-headline">Identity verified. Craftsmanship assured.</h1>
                <p class="auth-editorial-sub">Access your private profile to review saved measurement blueprints and active tailoring commissions.</p>
            </div>
        </section>

        <section class="auth-form-pane">
            <div class="auth-form-wrapper">
                
                <header class="auth-pane-header">
                    <h2 class="auth-pane-title">Suit Boss Studio</h2>
                    <p class="auth-pane-switch">New to the studio? <a href="#register" id="toggle-to-register">Create an account</a></p>
                </header>

                <div class="oauth-federation-matrix">
                    <button class="btn-oauth" id="oauth-google" aria-label="Authenticate using Google Credentials">
                        <svg class="oauth-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.6-4.53-2.61-4.53z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
                        Continue with Google
                    </button>
                    <button class="btn-oauth" id="oauth-facebook" aria-label="Authenticate using Facebook Credentials">
                        <svg class="oauth-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        Continue with Facebook
                    </button>
                </div>

                <div class="auth-matrix-divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">or email details</span>
                    <span class="divider-line"></span>
                </div>

                <form id="auth-credential-form" novalidate>
                    <div class="input-cell">
                        <label for="auth-email">Email Address</label>
                        <input type="email" id="auth-email" name="email" placeholder="name@domain.com" autocomplete="email" required>
                        <span class="error-indicator" aria-live="polite"></span>
                    </div>

                    <div class="input-cell">
                        <label for="auth-password">Password</label>
                        <div class="password-input-wrap">
                            <input type="password" id="auth-password" name="password" placeholder="••••••••••••" autocomplete="current-password" required>
                            <button
                                type="button"
                                class="password-toggle-btn"
                                id="auth-password-toggle"
                                aria-label="Show password"
                                aria-pressed="false"
                                aria-controls="auth-password"
                            >
                                <svg class="pw-icon pw-icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="pw-icon pw-icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
                                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.4 20.4 0 0 1 5.06-6.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 8 11 8a20.4 20.4 0 0 1-3.22 4.44M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                        <span class="error-indicator" aria-live="polite"></span>
                    </div>

                    <div class="auth-utilities-row">
                        <label class="checkbox-container">
                            <input type="checkbox" id="auth-remember" name="remember">
                            <span class="custom-checkbox"></span>
                            Remember configuration
                        </label>
                        <a href="#recovery" class="auth-recovery-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-premium-pill auth-submit-action" id="auth-submit-btn">Authorize Entry</button>
                </form>

            </div>
        </section>

    </main>

    <script>
        /**
         * AUTH CANOPY SLIDESHOW
         * Crossfades between the canopy's background slides every 3.5s (the
         * midpoint of the requested 3-4s range). Self-contained and runs
         * immediately — deliberately not routed through app.js, since this
         * is decorative presentation with no dependency on Firebase/auth
         * state, matching the pattern already used for index.html's
         * header-mode script.
         */
        (function () {
            const slideshow = document.getElementById('auth-canopy-slideshow');
            if (!slideshow) return;

            const slides = Array.from(slideshow.querySelectorAll('.auth-canopy-slide'));
            if (slides.length < 2) return;

            let activeIndex = slides.findIndex((slide) => slide.classList.contains('is-active'));
            if (activeIndex === -1) activeIndex = 0;

            setInterval(() => {
                const nextIndex = (activeIndex + 1) % slides.length;
                slides[activeIndex].classList.remove('is-active');
                slides[nextIndex].classList.add('is-active');
                activeIndex = nextIndex;
            }, 3500);
        })();
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
